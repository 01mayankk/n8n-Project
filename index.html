<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Notes Generator</title>

<!-- Markdown parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Glow background */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, #3b82f6, transparent);
  filter: blur(120px);
  z-index: -1;
}

/* Container */
.container {
  width: 90%;
  max-width: 900px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
  animation: fadeIn 0.8s ease;
}

/* Title */
h1 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 28px;
}

/* Input */
.input-box {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 16px;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* Button */
button {
  padding: 14px 24px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #3b82f6, #9333ea);
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px rgba(147,51,234,0.6);
}

/* Output Card */
#output {
  margin-top: 20px;
  padding: 20px;
  background: rgba(0,0,0,0.4);
  border-radius: 16px;
  max-height: 400px;
  overflow-y: auto;
  line-height: 1.6;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Loader */
.loader {
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Markdown styling */
#output h2 { color: #60a5fa; }
#output h3 { color: #a78bfa; }
#output ul { padding-left: 20px; }
#output li { margin-bottom: 5px; }
</style>
</head>

<body>

<div class="container">
  <h1>📘 AI Notes Generator</h1>

  <div class="input-box">
    <input id="topic" placeholder="Try: Heap, Graph, DP..." />
    <button onclick="generate()">Generate ✨</button>
  </div>

  <div id="output">✨ Your AI-generated notes will appear here...</div>
</div>

<script>
async function generate() {
  const topic = document.getElementById("topic").value.trim();
  const output = document.getElementById("output");

  if (!topic) {
    output.innerHTML = "⚠️ Please enter a topic!";
    return;
  }

  output.innerHTML = '<div class="loader"></div>';

  try {
    const res = await fetch("https://jackknife-iodine-harmonica.ngrok-free.dev/webhook/notes-generator", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ topic })
    });

    const data = await res.json();

    const text =
      data?.candidates?.[0]?.content?.parts?.[0]?.text ||
      "⚠️ No response";

    // ✅ Convert Markdown → HTML
    output.innerHTML = marked.parse(text);

  } catch (err) {
    output.innerHTML = "❌ Error: " + err.message;
  }
}
</script>

</body>
</html>
