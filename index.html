<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Summarizer | theidealist</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #238636;
            --accent-hover: #2ea043;
            --border: #30363d;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 8px;
            text-align: center;
        }

        p.subtitle {
            color: #8b949e;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            background: #0d1117;
            border: 1px solid var(--border);
            color: white;
            padding: 12px 16px;
            border-radius: 6px;
            outline: none;
            font-size: 1rem;
        }

        input:focus {
            border-color: #58a6ff;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: #30363d;
            cursor: not-allowed;
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            background: #0d1117;
            border-left: 4px solid var(--accent);
            border-radius: 4px;
            line-height: 1.8;
            white-space: pre-wrap;
            display: none;
            font-size: 1.05rem;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #58a6ff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Video Analysis Engine</h1>
    <p class="subtitle">Extract 5-7 key bullet points using Gemini AI</p>

    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="Paste YouTube link here..." required>
        <button onclick="generateSummary()" id="submitBtn">Analyze</button>
    </div>

    <div id="loader" class="loader">AI is processing transcript... please wait.</div>
    <div id="result"></div>
</div>

<script>
    async function generateSummary() {
    const videoUrl = document.getElementById('videoUrl').value;
    const btn = document.getElementById('submitBtn');
    const resultDiv = document.getElementById('result');

    btn.disabled = true;

    try {
        // We use URLSearchParams to send a "Simple Request" which avoids the OPTIONS trigger
        const params = new URLSearchParams();
        params.append('video_url', videoUrl);

        const response = await fetch('http://localhost:5678/webhook/video-summarizer', {
            method: 'POST',
            body: params // Sending as form-data instead of JSON
        });

        const data = await response.text();
        resultDiv.style.display = "block";
        resultDiv.innerHTML = data;

    } catch (error) {
        resultDiv.innerHTML = "Connection Error. Make sure n8n is Active.";
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
